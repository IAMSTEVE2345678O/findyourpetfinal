<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile — FindMyPet</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Georgia','Times New Roman',serif;background:#080808;color:#f0f0f0;min-height:100vh;display:flex;flex-direction:column}
    .ticker-wrap{background:#e63c2f;overflow:hidden;white-space:nowrap;height:28px;display:flex;align-items:center}
    .ticker-label{background:#9a1a10;color:#fff;font-family:'Segoe UI',sans-serif;font-size:.6rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;padding:0 1rem;height:100%;display:flex;align-items:center;flex-shrink:0}
    .ticker-track{display:inline-block;animation:ticker 28s linear infinite}
    .ticker-track span{font-family:'Segoe UI',sans-serif;font-size:.65rem;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:#fff;padding:0 2.5rem}
    .ticker-track span::before{content:'●  ';opacity:.6}
    @keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
    .page-header{background:#080808;border-bottom:3px solid #e63c2f;padding:0 2.5rem;height:52px;display:flex;align-items:center;gap:1.25rem;flex-shrink:0}
    .page-logo{font-family:'Georgia',serif;font-size:1.4rem;font-weight:900;letter-spacing:-1px;text-transform:uppercase;color:#fff;text-decoration:none;line-height:1;white-space:nowrap}
    .page-logo em{font-style:normal;color:#e63c2f}
    .header-sep{width:1px;height:20px;background:#2a2a2a;flex-shrink:0}
    .page-section{font-family:'Segoe UI',sans-serif;font-size:.62rem;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:#555}
    .header-nav{margin-left:auto;display:flex;align-items:center;gap:.75rem}
    .header-nav a{font-family:'Segoe UI',sans-serif;font-size:.72rem;color:#555;text-decoration:none;letter-spacing:.5px}
    .header-nav a:hover{color:#ddd}
    .section-rule{font-family:'Segoe UI',sans-serif;font-size:.6rem;font-weight:800;letter-spacing:3px;text-transform:uppercase;color:#e63c2f;border-bottom:2px solid #e63c2f;padding-bottom:.5rem;margin-bottom:1.5rem}
    footer{border-top:3px double #1a1a1a;padding:.9rem 2.5rem;display:flex;justify-content:space-between;align-items:center;margin-top:auto}
    footer span,footer a{font-family:'Segoe UI',sans-serif;font-size:.62rem;color:#2a2a2a;letter-spacing:1.5px;text-transform:uppercase;text-decoration:none}
    footer a:hover{color:#555}

    .layout{display:grid;grid-template-columns:1fr 1fr;gap:1px;background:#141414;flex:1}
    .col{background:#080808;padding:2.5rem}

    /* Profile card */
    .profile-card{border:1px solid #1a1a1a;padding:1.5rem;margin-bottom:2rem;display:flex;align-items:center;gap:1.25rem}
    .profile-avatar{width:56px;height:56px;background:#e63c2f;display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:900;color:#fff;font-family:'Georgia',serif;flex-shrink:0;text-transform:uppercase}
    .profile-name{font-size:1.2rem;font-weight:900;letter-spacing:-.3px;margin-bottom:.2rem}
    .profile-email{font-family:'Segoe UI',sans-serif;font-size:.78rem;color:#555}
    .profile-joined{font-family:'Segoe UI',sans-serif;font-size:.68rem;color:#333;margin-top:.2rem;text-transform:uppercase;letter-spacing:.5px}

    /* Form */
    .form-group{margin-bottom:1rem}
    .form-label{display:block;font-family:'Segoe UI',sans-serif;font-size:.6rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#555;margin-bottom:.4rem}
    .form-label .opt{color:#2a2a2a;font-weight:400;letter-spacing:0;text-transform:none;font-size:.6rem}
    .form-input{width:100%;background:#0f0f0f;border:1px solid #1f1f1f;color:#f0f0f0;font-family:'Segoe UI',sans-serif;font-size:.88rem;padding:.65rem .85rem}
    .form-input:focus{outline:none;border-color:#e63c2f}
    .form-input:disabled{color:#333;cursor:default}
    .form-input::placeholder{color:#2a2a2a}
    .btn-save{background:#e63c2f;color:#fff;font-family:'Segoe UI',sans-serif;font-size:.82rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;padding:.8rem 1.75rem;border:none;cursor:pointer}
    .btn-save:hover{background:#c9271b}
    .btn-logout{background:transparent;color:#555;font-family:'Segoe UI',sans-serif;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:.75rem 1.5rem;border:1px solid #2a2a2a;cursor:pointer;margin-top:1rem;width:100%}
    .btn-logout:hover{border-color:#555;color:#ddd}
    .save-ok{font-family:'Segoe UI',sans-serif;font-size:.75rem;color:#7aba7a;margin-top:.75rem;display:none}
    .err-msg{font-family:'Segoe UI',sans-serif;font-size:.75rem;color:#e63c2f;margin-top:.75rem;display:none}

    /* Listings */
    .listing-row{border:1px solid #141414;padding:1rem 1.25rem;margin-bottom:.75rem;display:flex;align-items:center;gap:1rem}
    .listing-emoji{font-size:1.4rem;flex-shrink:0}
    .listing-info{flex:1;min-width:0}
    .listing-name{font-family:'Segoe UI',sans-serif;font-size:.88rem;font-weight:800;color:#ddd;text-transform:uppercase;letter-spacing:.3px;margin-bottom:.15rem}
    .listing-meta{font-family:'Segoe UI',sans-serif;font-size:.7rem;color:#555;line-height:1.5}
    .badge{font-family:'Segoe UI',sans-serif;font-size:.58rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;padding:.2rem .55rem;flex-shrink:0}
    .badge-open{background:#e63c2f;color:#fff}
    .badge-solved{background:#1a1a1a;color:#555;border:1px solid #2a2a2a}
    .listing-actions{display:flex;gap:.5rem;flex-shrink:0;align-items:center}
    .btn-view{font-family:'Segoe UI',sans-serif;font-size:.68rem;color:#555;text-decoration:none;padding:.35rem .7rem;border:1px solid #1f1f1f;white-space:nowrap}
    .btn-view:hover{border-color:#555;color:#ddd}
    .btn-solve{font-family:'Segoe UI',sans-serif;font-size:.68rem;color:#7aba7a;background:#0a1a0a;border:1px solid #2a5a2a;padding:.35rem .7rem;cursor:pointer;white-space:nowrap}
    .btn-solve:hover{background:#0f2f0f}
    .btn-delete{font-family:'Segoe UI',sans-serif;font-size:.68rem;color:#444;background:transparent;border:1px solid #1a1a1a;padding:.35rem .7rem;cursor:pointer;white-space:nowrap}
    .btn-delete:hover{border-color:#e63c2f;color:#e63c2f}
    .no-listings{font-family:'Segoe UI',sans-serif;font-size:.82rem;color:#2a2a2a;text-align:center;padding:2rem;border:1px solid #111}

    .stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#141414;margin-bottom:2rem;border:1px solid #141414}
    .stat{background:#080808;padding:.9rem;text-align:center}
    .stat-num{font-size:1.6rem;font-weight:900;color:#e63c2f;line-height:1;font-family:'Georgia',serif}
    .stat-label{font-family:'Segoe UI',sans-serif;font-size:.6rem;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;color:#444;margin-top:.25rem}

    @media(max-width:700px){.layout{grid-template-columns:1fr}}
  </style>
</head>
<body>

  <div class="ticker-wrap">
    <div class="ticker-label">Live</div>
    <div class="ticker-track">
      <span>FindMyPet — manage your account and listings</span>
      <span>FindMyPet — manage your account and listings</span>
    </div>
  </div>

  <header class="page-header">
    <a href="index.html" class="page-logo">Find<em>My</em>Pet</a>
    <div class="header-sep"></div>
    <span class="page-section">My Profile</span>
    <nav class="header-nav" id="header-nav">
      <a href="auth.html">Sign In</a>
    </nav>
  </header>

  <div class="layout">

    <!-- LEFT: Profile info + edit -->
    <div class="col">
      <div class="section-rule">&#9632; Account Details</div>

      <div class="profile-card" id="profile-card"></div>

      <form onsubmit="saveProfile(event)">
        <div class="form-group">
          <label class="form-label">Display Name</label>
          <input class="form-input" type="text" id="f-name" placeholder="Your full name" required />
        </div>
        <div class="form-group">
          <label class="form-label">Email <span class="opt">(cannot be changed)</span></label>
          <input class="form-input" type="email" id="f-email" disabled />
        </div>
        <div class="form-group">
          <label class="form-label">Phone <span class="opt">(optional)</span></label>
          <input class="form-input" type="tel" id="f-phone" placeholder="e.g. 555-123-4567" />
        </div>
        <button class="btn-save" type="submit">Save Changes</button>
        <div class="save-ok" id="save-ok">✓ &nbsp; Profile updated.</div>
        <div class="err-msg" id="err-msg"></div>
      </form>

      <button class="btn-logout" onclick="doLogout()">Sign Out</button>
    </div>

    <!-- RIGHT: My listings -->
    <div class="col">
      <div class="section-rule">&#9632; My Cases</div>
      <div class="stat-row" id="stats"></div>
      <div id="listings-wrap"></div>
      <div style="margin-top:1.5rem">
        <a href="report.html" style="display:inline-flex;align-items:center;gap:.5rem;background:#e63c2f;color:#fff;font-family:'Segoe UI',sans-serif;font-size:.82rem;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;padding:.85rem 1.75rem;text-decoration:none">+ Report a Missing Pet</a>
      </div>
    </div>

  </div>

  <footer>
    <span>FindMyPet &copy; 2026</span>
    <span>Community Missing Pet Registry</span>
    <a href="privacy.html">Privacy Policy</a>
  </footer>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
  <script>
    function esc(s)      { return FMP.esc(s); }
    function petEmoji(t) { return FMP.petEmoji(t); }
    function fmtDate(ts) { return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
    async function doLogout(){ await FMP.logout(); window.location.href='index.html'; }

    let me = null;

    function renderProfile(){
      document.getElementById('f-name').value  = me.name||'';
      document.getElementById('f-email').value = me.email||'';
      document.getElementById('f-phone').value = me.phone||'';
      const initials=(me.name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
      const joined=me.createdAt?fmtDate(me.createdAt):'';
      document.getElementById('profile-card').innerHTML=`
        <div class="profile-avatar">${esc(initials)}</div>
        <div>
          <div class="profile-name">${esc(me.name)}</div>
          <div class="profile-email">${esc(me.email)}</div>
          ${joined?`<div class="profile-joined">Member since ${esc(joined)}</div>`:''}
        </div>`;
    }

    async function saveProfile(e){
      e.preventDefault();
      const name  = document.getElementById('f-name').value.trim();
      const phone = document.getElementById('f-phone').value.trim();
      if(!name){ showErr('Name cannot be empty.'); return; }

      try{
        await FMP.updateProfile(me.id, {name, phone});
        me.name=name; me.phone=phone;

        document.getElementById('save-ok').style.display='block';
        setTimeout(()=>{ document.getElementById('save-ok').style.display='none'; },3000);
        renderProfile();
      }catch(err){
        showErr(err.message||'Could not update your profile. Please try again.');
      }
    }

    function showErr(msg){
      const el=document.getElementById('err-msg');
      el.textContent=msg;
      el.style.display='block';
      setTimeout(()=>{ el.style.display='none'; },4000);
    }

    async function solveListing(id){
      if(!confirm('Mark this case as Solved? Your pet has been found!')) return;
      await FMP.solveListing(id);
      await renderListings();
    }

    async function deleteListing(id){
      if(!confirm('Delete this listing? This cannot be undone.')) return;
      await FMP.deleteListing(id);
      await renderListings();
    }

    async function renderListings(){
      const myListings=await FMP.getUserListings(me.id);
      const open=myListings.filter(l=>l.status==='open').length;
      const solved=myListings.filter(l=>l.status==='solved').length;

      document.getElementById('stats').innerHTML=`
        <div class="stat"><div class="stat-num">${myListings.length}</div><div class="stat-label">Total Cases</div></div>
        <div class="stat"><div class="stat-num">${open}</div><div class="stat-label">Open</div></div>
        <div class="stat"><div class="stat-num">${solved}</div><div class="stat-label">Solved</div></div>`;

      const wrap=document.getElementById('listings-wrap');
      if(myListings.length===0){
        wrap.innerHTML=`<div class="no-listings">You haven't posted any cases yet.</div>`;
        return;
      }
      wrap.innerHTML=myListings.map(l=>`
        <div class="listing-row">
          <div class="listing-emoji">${petEmoji(l.petType)}</div>
          <div class="listing-info">
            <div class="listing-name">${esc(l.petName)}</div>
            <div class="listing-meta">${esc(l.breed)} · ${esc(l.location)}<br/>Posted ${fmtDate(l.postedAt)}</div>
          </div>
          <span class="badge badge-${l.status}">${l.status==='open'?'Open':'Solved'}</span>
          <div class="listing-actions">
            <a href="listing.html?id=${esc(l.id)}" class="btn-view">View</a>
            ${l.status==='open'?`<button class="btn-solve" onclick="solveListing('${esc(l.id)}')">✓ Solved</button>`:''}
            <button class="btn-delete" onclick="deleteListing('${esc(l.id)}')">Delete</button>
          </div>
        </div>`).join('');
    }

    (async function(){
      me = await FMP.getUser();
      if(!me){
        window.location.href='auth.html?next='+encodeURIComponent(location.href);
        return;
      }
      await FMP.initHeader();
      renderProfile();
      await renderListings();
    })();
  </script>

</body>
</html>
