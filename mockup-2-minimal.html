<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mockup 2 — Clean & Minimal</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #fafaf8; color: #1a1a1a; min-height: 100vh; display: flex; flex-direction: column; }

    .mockup-label { background: #eee; color: #999; font-size: 0.72rem; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; text-align: center; padding: 0.5rem; }

    header { padding: 0 3rem; display: flex; align-items: center; justify-content: space-between; height: 68px; border-bottom: 1px solid #e8e8e8; }
    .logo { font-size: 1.2rem; font-weight: 800; color: #1a1a1a; letter-spacing: -0.5px; }
    .logo span { color: #e63c2f; }
    .header-nav { display: flex; gap: 1.5rem; }
    .header-nav a { font-size: 0.82rem; font-weight: 600; color: #888; text-decoration: none; }

    .hero { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 5rem 2rem 3rem; text-align: center; }
    .hero h1 { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 800; color: #1a1a1a; line-height: 1.15; margin-bottom: 1rem; letter-spacing: -1px; }
    .hero h1 em { font-style: normal; color: #e63c2f; }
    .hero p { font-size: 1rem; color: #999; max-width: 440px; margin: 0 auto 3rem; line-height: 1.7; }

    .btn-row { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; margin-bottom: 1.5rem; }
    .btn { padding: 0.85rem 1.8rem; font-size: 0.88rem; font-weight: 700; border-radius: 6px; text-decoration: none; }
    .btn-fill { background: #1a1a1a; color: #fff; }
    .btn-outline { background: transparent; border: 2px solid #ddd; color: #555; }

    .btn-row-2 { display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center; }
    .btn-link { font-size: 0.85rem; color: #aaa; text-decoration: none; padding: 0.5rem 1rem; border-radius: 4px; border: 1px solid #e8e8e8; }

    footer { padding: 2rem; border-top: 1px solid #eee; text-align: center; }
    footer a { font-size: 0.78rem; color: #bbb; text-decoration: none; }
  </style>
</head>
<body>
  <div class="mockup-label">Mockup 2 — Clean &amp; Minimal</div>

  <header>
    <div class="logo">Find<span>My</span>Pet</div>
    <div class="header-nav">
      <a href="#">Browse</a>
      <a href="#">Sign in</a>
    </div>
  </header>

  <section class="hero">
    <h1>Help your<br /><em>lost pet</em><br />find its way home.</h1>
    <p>Post a missing pet, help a neighbor find theirs, or connect with a licensed professional — all in one place.</p>

    <div class="btn-row">
      <a href="#" class="btn btn-fill">Report a missing pet</a>
      <a href="#" class="btn btn-outline">Browse open cases</a>
    </div>
    <div class="btn-row-2">
      <a href="#" class="btn-link">Texting Portal</a>
      <a href="#" class="btn-link">Call a Professional</a>
    </div>
  </section>

  <footer><a href="#">Privacy Policy</a></footer>
</body>
</html>
